<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>
Panel Admin
</title>

</head>

<body>

<h1>
⚙️ Panel de precios
</h1>

<form method="POST">

<table border="1">

<tr>

<th>
Concepto
</th>

<th>
Precio
</th>

</tr>

{% for fila in datos %}

<tr>

<td>

{{fila[0]}}

</td>

<td>

<input
type="text"
name="{{fila[0]}}"
value="{{ "{:,}".format(fila[1]|int).replace(",", ".") }}">

</td>

</tr>

{% endfor %}

</table>

<br>

<button type="submit">

💾 Guardar cambios

</button>

</form>

</body>

</html>
